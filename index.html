<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 스트레스 유형 진단 - MIND N SCENT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #eef2ec 0%, #dfe6da 50%, #d4dccf 100%);
    min-height: 100vh;
    color: #3a3a3a;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  .header {
    text-align: center;
    padding: 30px 0 20px;
  }

  .header .logo-img {
    height: 72px;
    margin-bottom: 16px;
    background: transparent;
    mix-blend-mode: multiply;
  }

  .header h1 {
    font-size: 24px;
    font-weight: 700;
    color: #3d4f3d;
    line-height: 1.4;
    margin-bottom: 8px;
  }

  .header .subtitle {
    font-size: 14px;
    color: #6b7f6b;
    line-height: 1.6;
  }

  .progress-bar {
    background: rgba(255,255,255,0.5);
    border-radius: 20px;
    height: 6px;
    margin: 20px 0 10px;
    overflow: hidden;
    position: sticky;
    top: 10px;
    z-index: 10;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7a9e7a, #5c855c);
    border-radius: 20px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    text-align: center;
    font-size: 13px;
    color: #6b7f6b;
    margin-bottom: 20px;
  }

  .quiz-card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px 16px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }

  .checklist-item {
    display: flex;
    align-items: center;
    padding: 13px 14px;
    margin-bottom: 4px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .checklist-item:hover {
    background: rgba(122,158,122,0.08);
  }

  .checklist-item.checked {
    background: rgba(122,158,122,0.12);
  }

  .checklist-item input[type="checkbox"] {
    display: none;
  }

  .custom-checkbox {
    width: 22px;
    height: 22px;
    border: 2px solid #a3b8a3;
    border-radius: 6px;
    margin-right: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  .checklist-item.checked .custom-checkbox {
    background: #5c855c;
    border-color: #5c855c;
  }

  .custom-checkbox::after {
    content: '\2713';
    color: white;
    font-size: 14px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .checklist-item.checked .custom-checkbox::after {
    opacity: 1;
  }

  .checklist-label {
    font-size: 15px;
    line-height: 1.5;
    color: #3d4f3d;
  }

  .submit-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #5c855c, #7a9e7a);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    margin-top: 24px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(92,133,92,0.3);
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(92,133,92,0.4);
  }

  /* Results */
  .result-container {
    display: none;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px 24px;
    margin-bottom: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    text-align: center;
  }

  .result-card h2 {
    font-size: 22px;
    color: #3d4f3d;
    margin-bottom: 6px;
  }

  .result-card .result-subtitle {
    font-size: 14px;
    color: #6b7f6b;
    margin-bottom: 24px;
  }

  .type-badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .type-badge.primary { background: #3d4f3d; color: white; }
  .type-badge.secondary { background: #c4d4c4; color: #3d4f3d; }
  .type-badge.complex { background: linear-gradient(135deg, #3d4f3d, #5c855c); color: white; }

  .result-type-name {
    font-size: 28px;
    font-weight: 700;
    color: #3d4f3d;
    margin: 8px 0;
  }

  .result-type-emoji {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .score-bar-container {
    margin: 20px 0;
    text-align: left;
  }

  .score-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    gap: 10px;
  }

  .score-label {
    width: 90px;
    font-size: 13px;
    font-weight: 500;
    color: #3d4f3d;
    text-align: right;
  }

  .score-bar-bg {
    flex: 1;
    height: 10px;
    background: #dfe6da;
    border-radius: 5px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.8s ease;
  }

  .score-bar-fill.type-a { background: linear-gradient(90deg, #e8a87c, #d4956b); }
  .score-bar-fill.type-b { background: linear-gradient(90deg, #7ec8e3, #5fb3d0); }
  .score-bar-fill.type-c { background: linear-gradient(90deg, #f7dc6f, #f4d03f); }
  .score-bar-fill.type-d { background: linear-gradient(90deg, #e8a0bf, #d486a8); }
  .score-bar-fill.type-e { background: linear-gradient(90deg, #f0a868, #e09050); }
  .score-bar-fill.type-f { background: linear-gradient(90deg, #81c784, #66bb6a); }

  .score-value {
    width: 35px;
    font-size: 14px;
    font-weight: 700;
    color: #3d4f3d;
  }

  .tip-box {
    background: rgba(255,255,255,0.85);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }

  .tip-box h3 {
    font-size: 17px;
    font-weight: 600;
    color: #3d4f3d;
    margin-bottom: 12px;
    text-align: center;
  }

  .tip-box p {
    font-size: 14px;
    line-height: 1.8;
    color: #4a5e4a;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  .retry-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: transparent;
    color: #6b7f6b;
    border: 2px solid #a3b8a3;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.3s ease;
  }

  .retry-btn:hover {
    background: #5c855c;
    color: white;
    border-color: #5c855c;
  }

  .footer {
    text-align: center;
    padding: 30px 0;
    font-size: 12px;
    color: #8a9e8a;
  }
</style>
</head>

function toggleCheck(el) {
  var cb = el.querySelector('input[type="checkbox"]');
  cb.checked = !cb.checked;
  el.classList.toggle('checked', cb.checked);
  updateCounts();
}

function updateCounts() {
  var total = 0;
  GROUPS.forEach(function(g) {
    total += document.querySelectorAll('input[name="'+g+'"]:checked').length;
  });
  var pct = Math.round((total / TOTAL_ITEMS) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = total + ' / ' + TOTAL_ITEMS;
}

function showResult() {
  var scores = {};
  GROUPS.forEach(function(g) {
    scores[g] = document.querySelectorAll('input[name="'+g+'"]:checked').length;
  });

  var total = Object.values(scores).reduce(function(a,b){return a+b;}, 0);
  if (total === 0) { alert('최소 1개 이상 체크해 주세요!'); return; }

  var sorted = Object.entries(scores).sort(function(a,b){return b[1]-a[1];});
  var first = sorted[0];
  var second = sorted[1];
  var diff = first[1] - second[1];
  var isComplex = diff <= 2 && second[1] > 0;

  function brAfterDot(text) {
    return text.replace(/\.\s*/g, '.<br>');
  }

  var resultCard = document.getElementById('resultCard');
  var firstInfo = typeInfo[first[0]];
  var secondInfo = typeInfo[second[0]];

  if (isComplex) {
    resultCard.innerHTML =
      '<span class="type-badge complex">복합유형</span>' +
      '<div class="result-type-emoji">' + firstInfo.emoji + ' ' + secondInfo.emoji + '</div>' +
      '<div class="result-type-name">' + firstInfo.name + ' + ' + secondInfo.name + '</div>' +
      '<p style="font-size:14px;color:#6b7f6b;line-height:1.7;margin-top:12px;word-break:keep-all;overflow-wrap:break-word;">' +
        '두 가지 유형이 비슷하게 나왔어요!<br>' +
        brAfterDot(firstInfo.description) + '동시에, ' +
        brAfterDot(secondInfo.description.charAt(0).toLowerCase() + secondInfo.description.slice(1)) +
      '</p>';
  } else {
    resultCard.innerHTML =
      '<span class="type-badge primary">1순위</span>' +
      '<div class="result-type-emoji">' + firstInfo.emoji + '</div>' +
      '<div class="result-type-name">' + firstInfo.name + '</div>' +
      '<p style="font-size:13px;color:#6b7f6b;margin:4px 0 16px;">' + firstInfo.keyword + '</p>' +
      '<p style="font-size:14px;color:#4a5e4a;line-height:1.7;word-break:keep-all;overflow-wrap:break-word;">' + brAfterDot(firstInfo.description) + '</p>' +
      (second[1] > 0 ?
        '<div style="margin-top:20px;padding-top:16px;border-top:1px solid rgba(0,0,0,0.06);">' +
          '<span class="type-badge secondary">2순위</span>' +
          '<div style="font-size:18px;font-weight:600;color:#3d4f3d;margin:6px 0 4px;">' +
            secondInfo.emoji + ' ' + secondInfo.name +
          '</div>' +
          '<p style="font-size:13px;color:#6b7f6b;">' + secondInfo.keyword + '</p>' +
        '</div>' : '');
  }

  var names = {a:'긴장형',b:'불안형',c:'무기력형',d:'감정과부하형',e:'번아웃형',f:'회피형'};
  var scoreBars = document.getElementById('scoreBars');
  scoreBars.innerHTML = sorted.map(function(item) {
    return '<div class="score-row">' +
      '<span class="score-label">' + names[item[0]] + '</span>' +
      '<div class="score-bar-bg"><div class="score-bar-fill type-' + item[0] + '" style="width:' + (item[1]/8*100) + '%"></div></div>' +
      '<span class="score-value">' + item[1] + '</span>' +
    '</div>';
  }).join('');

  var tipBox = document.getElementById('tipBox');
  if (isComplex) {
    tipBox.innerHTML =
      '<h3>당신을 위한 한마디</h3>' +
      '<p>' + brAfterDot(firstInfo.message) + '</p>' +
      '<p style="margin-top:12px;">' + brAfterDot(secondInfo.message) + '</p>';
  } else {
    tipBox.innerHTML =
      '<h3>당신을 위한 한마디</h3>' +
      '<p>' + brAfterDot(firstInfo.message) + '</p>';
  }

  document.getElementById('quizForm').style.display = 'none';
  document.getElementById('resultContainer').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetQuiz() {
  document.querySelectorAll('input[type="checkbox"]').forEach(function(cb) { cb.checked = false; });
  document.querySelectorAll('.checklist-item').forEach(function(el) { el.classList.remove('checked'); });
  updateCounts();
  document.getElementById('quizForm').style.display = 'block';
  document.getElementById('resultContainer').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
